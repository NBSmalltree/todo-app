name: Build Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: Build renderer
        run: npm run build:renderer

      - name: Build Electron app (ARM64)
        run: npx electron-builder --mac --arm64 --publish never

      - name: Move ARM64 DMG
        run: |
          mkdir -p dist-electron-arm64
          mv dist-electron/*.dmg dist-electron-arm64/

      - name: Upload Mac ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm64-build
          path: dist-electron-arm64/*.dmg

  build-mac-x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: Build renderer
        run: npm run build:renderer

      - name: Rebuild native modules for x64
        run: npx electron-rebuild --arch x64

      - name: Build Electron app (x64)
        run: npx electron-builder --mac --x64 --publish never

      - name: Upload Mac x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-x64-build
          path: dist-electron/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: Build renderer
        run: npm run build:renderer

      - name: Build Electron app
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: dist-electron/*.exe

  release:
    needs: [build-mac-arm64, build-mac-x64, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mac-arm64-build/*.dmg
            artifacts/mac-x64-build/*.dmg
            artifacts/win-build/*.exe
          generate_release_notes: true
